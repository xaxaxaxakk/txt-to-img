<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>로그 발췌</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <link type="text/css" rel="stylesheet" href="./style.css" />
    <script src="./index.js"></script>
  </head>
  <body id="text-to-image">
    <div class="text-to-image-converter-settings">
      <div class="inline-drawer">
        <div class="inline-drawer-content">
          <div class="flex-container">
            <h4>
              <i class="fa-solid fa-floppy-disk"></i>
              프리셋
              <button id="import_preset" class="buttons">
                <i class="fa-solid fa-file-import"></i>
              </button>
              <button id="backup_preset" class="buttons">
                <i class="fa-solid fa-file-export"></i>
              </button>
            </h4>
            <div class="preset-control">
              <input type="text" id="preset_name" placeholder="프리셋 이름" />
              <button id="create_preset" class="buttons">
                <i class="fa-solid fa-check"></i>
              </button>
            </div>
            <div class="preset-control">
              <select id="preset_selector" class="text-to-image-select"></select>
              <span>
                <button id="save_preset" class="buttons">
                  <i class="fa-solid fa-floppy-disk"></i>
                </button>
                <button id="rename_preset" class="buttons">
                  <i class="fa-solid fa-pen"></i>
                </button>
                <button id="delete_preset" class="buttons clear">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </span>
            </div>
          </div>

          <div class="flex-container botCard">
            <h4>
              <i class="fa-solid fa-robot"></i>
              봇카드
            </h4>
            <div class="bot-datas">
              <button class="bot-data botImporter"></button>
              <button class="bot-data" data-type="description" disabled>
                <i class="fa-solid fa-address-card"></i>
              </button>
              <button class="bot-data" data-type="greeting" disabled>
                <i class="fa-solid fa-message"></i>
              </button>
              <button class="bot-data" data-type="scenario" disabled>
                <i class="fa-solid fa-video"></i>
              </button>
              <button class="bot-data botSaver" disabled>
                <i class="fa-solid fa-floppy-disk"></i>
              </button>
            </div>
          </div>

          <div class="flex-container">
            <h4>
              <i class="fa-solid fa-pen"></i>
              텍스트 입력
              <div class="preview-control">
                <input type="checkbox" id="preview_toggle" name="preview_toggle" style="display: none" />
                <label for="preview_toggle">미리보기</label>
                <input type="checkbox" id="html_toggle" name="html_toggle" style="display: none" />
                <label for="html_toggle">HTML</label>
              </div>
            </h4>
            <textarea id="text_to_image" placeholder="여기에 텍스트를 입력하세요.

지원되는 마크다운 목록:
  *이탤릭*, **볼드**, ***볼드 이탤릭***
  ~~취소선~~, __밑줄__
  --- (구분선, hr태그도 가능)"></textarea>
            <div class="text-field-buttons">
              <button id="clear_text_btn" class="clear-btn">
                <i class="fa-solid fa-eraser"></i>
                내용 삭제
              </button>
              <button id="restore_text_btn" class="buttons">
                <i class="fa-solid fa-rotate-right"></i>
              </button>
            </div>
            <div class="html-switcher-inputs html-mode-only" data-html-only="html_switcher_inputs">
              <div class="html-switcher-inputs-header">
                <span>책갈피</span>
                <button type="button" id="add_html_switcher_text" class="buttons">추가</button>
              </div>
              <div id="tti_html_switcher_list" class="html-switcher-inputs-list"></div>
              <div class="html-switcher-inputs-empty">[추가] 버튼을 클릭해 내용을 추가하세요.</div>
            </div>            
          </div>

          <div class="flex-container">
            <h4>
              <i class="fa-solid fa-exchange-alt"></i>
              단어 치환
              <div class="replace-control">
                <input type="checkbox" id="letter_control" name="letter_control" style="display: none" />
                <label for="letter_control">Aa</label>
                <input type="checkbox" id="unit_control" name="unit_control" style="display: none" />
                <label for="unit_control">ab</label>
              </div>
            </h4>
            <h6 style="display: inline-block;font-weight: normal !important;background-color: rgba(255, 255, 255, 0.5);padding: 5px 10px;border-radius: 8px;font-size: 11px;color: #474747;">여러 단어를 하나로 교체할 경우 <b>단어||단어</b> 형식으로 입력 가능하며, 바꿀 단어 칸을 비워두면 해당 문자는 삭제됩니다.</h6>
            <div class="flex-container">
              <input type="text" id="original_word_1" class="replacer_box" placeholder="원래 단어" />
              <input type="text" id="replacement_word_1" class="replacer_box" placeholder="바꿀 단어" />
            </div>
            <div class="flex-container">
              <input type="text" id="original_word_2" class="replacer_box" placeholder="원래 단어" />
              <input type="text" id="replacement_word_2" class="replacer_box" placeholder="바꿀 단어" />
            </div>
            <div class="flex-container">
              <input type="text" id="original_word_3" class="replacer_box" placeholder="원래 단어" />
              <input type="text" id="replacement_word_3" class="replacer_box" placeholder="바꿀 단어" />
            </div>
            <div class="flex-container">
              <input type="text" id="original_word_4" class="replacer_box" placeholder="원래 단어" />
              <input type="text" id="replacement_word_4" class="replacer_box" placeholder="바꿀 단어" />
            </div>
            <div class="replace-buttons">
              <button id="clear_replace" class="buttons clear">
                <i class="fa-solid fa-eraser"></i>
              </button>
              <button id="apply_replacement" class="buttons">
                <i class="fa-solid fa-pen-nib"></i>
              </button>
              <button id="restore_text" class="buttons">
                <i class="fa-solid fa-rotate-right"></i>
              </button>
            </div>
          </div>

          <div class="tab-container">
            <button class="tab-btn" data-tab="text-style">글꾸</button>
            <button class="tab-btn" data-tab="custom-highlighter">태그</button>
            <button class="tab-btn" data-tab="background">배경</button>
            <button class="tab-btn" data-tab="image-style">포토샵</button>
            <button class="tab-btn" data-tab="footer">기타</button>
          </div>

          <div id="text-style" class="tab-content flex-container">
            <h4>텍스트 스타일 설정</h4>
            <label for="tti_font_family" data-html-hide="font">글꼴</label>
            <select id="tti_font_family" data-html-hide="font"></select>

            <div class="custom-font-uploader" data-html-hide="font">
              <button id="upload-local-font" type="button" class="buttons">로컬 폰트 파일</button>
              <button id="delete-local-font" type="button" class="buttons" disabled>삭제</button>
            </div>

            <label for="tti_html_font_face" data-html-only="html_font_face">폰트명</label>
            <select id="tti_html_font_face" data-html-only="html_font_face">
              <option value="Ridibatang">리디바탕</option>
              <option value="Nanum Gothic">나눔고딕</option>
              <option value="GangwonEducationModuche">강원교육모두체</option>
              <option value="OngleipParkDahyeon">온글잎 박다현체</option>
            </select>

            <label for="tti_stroke_width">두께</label>
            <select id="tti_stroke_width">
              <option value="0">기본</option>
              <option value="0.8">세미 볼드</option>
              <option value="1.5">볼드</option>
            </select>

            <label for="tti_font_size_image" data-html-hide="font_size_image">사이즈</label>
            <input type="range" id="tti_font_size_image" min="20" max="44" step="1" data-html-hide="font_size_image" />
            <label for="tti_font_size_html" data-html-only="font_size_html">사이즈</label>
            <input type="range" id="tti_font_size_html" min="10" max="20" step="1" data-html-only="font_size_html" />

            <label for="tti_letter_spacing">자간</label>
            <input type="range" id="tti_letter_spacing" min="-0.2" max="0.3" step="0.02" />

            <label for="tti_line_height">행간</label>
            <input type="range" id="tti_line_height" min="0.8" max="2" step="0.05" />

            <label for="tti_font_align">정렬</label>
            <select id="tti_font_align">
              <option value="left">왼쪽</option>
              <option value="center">중앙</option>
              <option value="right">오른쪽</option>
            </select>

            <label for="tti_font_color">색상</label>
            <input type="color" id="tti_font_color" value="#000000" />

            <label for="tti_line_break" data-html-hide="line_break">줄바꿈</label>
            <select id="tti_line_break" data-html-hide="line_break">
              <option value="byWord">단어 기준</option>
              <option value="byChar">글자 기준</option>
            </select>

            <div id="custom-font-color" class="flex-container hide">
              <h4>마크다운 색상 설정<span>열기</span></h4>
              <div class="font-color-lists">
                <div class="italic-custom">
                  <input type="checkbox" id="use_italic_color" name="use_italic_color" />
                  <label>이탤릭</label>
                  <input type="color" id="tti_italic_font_color" value="#000000" />
                </div>
                <div class="bold-custom">
                  <input type="checkbox" id="use_bold_color" name="use_bold_color" />
                  <label>볼드</label>
                  <input type="color" id="tti_bold_font_color" value="#000000" />
                </div>
                <div class="boldItalic-custom">
                  <input type="checkbox" id="use_boldItalic_color" name="use_boldItalic_color" />
                  <label>볼드이탤릭</label>
                  <input type="color" id="tti_boldItalic_font_color" value="#000000" />
                </div>
                <div class="strikethrough-custom">
                  <input type="checkbox" id="use_strikethrough_color" name="use_strikethrough_color" />
                  <label>취소선</label>
                  <input type="color" id="tti_strikethrough_font_color" value="#000000" />
                </div>
                <div class="underline-custom">
                  <input type="checkbox" id="use_underline_color" name="use_underline_color" />
                  <label>밑줄</label>
                  <input type="color" id="tti_underline_font_color" value="#000000" />
                </div>
                <div class="markdown-color-row" data-html-only="blockquote_color">
                  <span class="markdown-color-row-spacer"></span>
                  <label data-html-only="blockquote_color">인용폰트</label>
                  <input type="color" id="tti_blockquote_font_color" value="#000000" data-html-only="blockquote_color" />
                </div>
                <div class="markdown-color-row" data-html-only="blockquote_color">
                  <span class="markdown-color-row-spacer"></span>
                  <label data-html-only="blockquote_color">인용배경</label>
                  <input type="color" id="tti_blockquote_bg_color" value="#ffffff" data-html-only="blockquote_color" />
                </div>
                <div class="markdown-color-row" data-html-only="blockquote_color">
                  <span class="markdown-color-row-spacer"></span>
                  <label data-html-only="blockquote_color">인용테두리</label>
                  <input type="color" id="tti_blockquote_border_color" value="#000000" data-html-only="blockquote_color" />
                </div>
              </div>
            </div>
          </div>

          <div id="custom-highlighter" class="tab-content flex-container">
            <h4>하이라이터 태그</h4>
            <div class="highlighter-lists"></div>
          </div>

          <div id="background" class="tab-content flex-container">
            <h4>배경 종류 선택</h4>
            <label for="tti_ratio" data-html-hide="ratio">비율</label>
            <select id="tti_ratio" data-html-hide="ratio">
              <option value="square">정사각형</option>
              <option value="rectangular">직사각형</option>
              <option value="longer">더 길게</option>
              <option value="full">전체 (한장)</option>
            </select>
            <label for="tti_fill_mode" data-html-hide="fill_mode">타입</label>
            <select id="tti_fill_mode" data-html-hide="fill_mode">
              <option value="cover">채우기</option>
              <option value="pattern">반복</option>              
              <option value="mix-top">혼합(이미지 상단)</option>
              <option value="mix-bottom">혼합(이미지 하단)</option>
            </select>
            <h5>배경 색상</h5>
            <div class="bgColor">
              <input type="checkbox" id="use_background_color" name="use_background_color" />
              <input type="color" id="background_color" name="background_color" />
            </div>
            <div class="bgColor">
              <input type="checkbox" id="use_second_background_color" name="use_second_background_color" />
              <input type="color" id="second_background_color" name="second_background_color" />
            </div>
            <h5>
              <i class="fa-solid fa-image"></i>
              배경 이미지
            </h5>
            <div id="background_image_gallery" class="background-gallery"></div>
            <h5 class="custom-bg">
              <i class="fa-solid fa-cloud-arrow-up"></i>
              커스텀 이미지
            </h5>
            <div class="custom-bg-upload">
              <label for="bg_image_upload" class="upload-btn" data-html-hide="upload_file">이미지 업로드</label>
              <input type="file" id="bg_image_upload" accept="image/*" style="display: none" data-html-hide="upload_file" />
              <input type="text" id="bg_image_url" placeholder="이미지 URL" data-html-only="bg_url" />
              <button id="bg_url_btn" class="upload-btn buttons" data-html-only="bg_url">등록</button>
            </div>
            <div id="custom_background_gallery" class="background-gallery"></div>
          </div>

          <div id="image-style" class="tab-content flex-container">
            <h4>배경 이미지 편집</h4>            
            <label for="bg_blur">블러</label>
            <input type="range" id="bg_blur" min="0" max="10" step="0.1" />
            <label for="bg_brightness">밝기</label>
            <input type="range" id="bg_brightness" min="40" max="180" step="5" />
            <label for="bg_grayscale">흑백</label>
            <input type="range" id="bg_grayscale" min="0" max="100" step="1" />
            <label for="bg_hue">색조</label>
            <input type="range" id="bg_hue" min="0" max="360" step="3" />
            <label for="bg_noise" data-html-hide="bg_noise">노이즈</label>
            <input type="range" id="bg_noise" min="0" max="100" step="1" data-html-hide="bg_noise" />
            <label for="overlay_opacity">오버레이</label>
            <input type="range" id="overlay_opacity" min="0" max="1" step="0.01" />
            <label for="overlay_color">오버레이색</label>
            <input type="color" id="overlay_color" />
          </div>

          <div id="footer" class="tab-content flex-container">
            <h5 data-html-only="footer_layout">컨테이너 설정</h5>
            <label data-html-only="footer_layout">형식</label>
            <select id="footer_layout_mode" data-html-only="footer_layout">
              <option value="scroll">스크롤하기</option>
              <option value="full">전체보기</option>
            </select>
            <label data-html-only="footer_width">가로</label>
            <input type="number" id="footer_width" min="100" step="10" data-html-only="footer_width" />
            <label class="footer-scroll-only" data-html-only="footer_height">세로</label>            
            <input type="number" id="footer_height" min="100" step="10" class="footer-scroll-only" data-html-only="footer_height"/>
            <div data-html-only="footer_layout" style="width: 100%; margin-bottom: 15px;"></div>
            <h5>바닥글</h5>
            <label>텍스트</label>
            <input type="text" id="footer_text" placeholder="" />
            <label>폰트색</label>
            <input type="color" id="footer_color" />
            <label data-html-only="footer_bg_color">배경색</label>
            <input type="color" id="footer_bg_color" data-html-only="footer_bg_color" />
          </div>

          <div class="flex-container" id="image_preview_box">
            <h4>
              <i class="fa-solid fa-eye"></i>
              미리보기
              <div class="refresh-preview">
                <i class="fa-solid fa-arrows-rotate"></i>
              </div>
            </h4>
            <div id="image_preview_container" class="image-preview"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
